name: Build EndPortalPlugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Limpar cache corrompido do Maven
        run: rm -rf ~/.m2/repository/com/mojang/brigadier

      - name: Compilar com Maven (sem cache)
        run: mvn clean package -B -U

      - name: Upload do .jar gerado
        uses: actions/upload-artifact@v4
        with:
          name: EndPortalPlugin
          path: target/EndPortalPlugin.jar
